<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flowbittools Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#020617;
color:white;
display:flex;
min-height:100vh;
}

.sidebar{
width:230px;
background:#071028;
padding:20px;
position:fixed;
height:100%;
overflow:auto;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:30px;
background:linear-gradient(45deg,#7c3aed,#ff0080);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.menu button{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:12px;
background:#111c44;
color:white;
font-weight:bold;
cursor:pointer;
}

.menu button:hover{
background:linear-gradient(45deg,#7c3aed,#ff0080);
}

.content{
margin-left:250px;
padding:20px;
width:100%;
}

.card-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#071028;
padding:20px;
border-radius:18px;
}

.card h2{
font-size:15px;
margin-bottom:10px;
}

.card p{
font-size:28px;
font-weight:bold;
}

.table-box{
background:#071028;
padding:20px;
border-radius:20px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
text-align:left;
font-size:14px;
}

th{
background:#111c44;
}

tr{
border-bottom:1px solid #1f2a52;
}

.action-btn{
padding:7px 10px;
border:none;
border-radius:8px;
font-size:12px;
margin:2px;
cursor:pointer;
color:white;
}

.green{background:green;}
.red{background:red;}
.blue{background:#2563eb;}
.purple{background:#9333ea;}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#111c44;
color:white;
}

.section{
display:none;
}

.active-section{
display:block;
}

@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
position:fixed;
bottom:0;
width:100%;
height:auto;
display:flex;
overflow:auto;
z-index:999;
padding:10px;
}

.logo{
display:none;
}

.menu{
display:flex;
gap:10px;
}

.menu button{
min-width:120px;
margin:0;
font-size:12px;
}

.content{
margin-left:0;
margin-bottom:100px;
padding:10px;
}

table{
font-size:12px;
}
}
</style>
</head>

<body>

<div class="sidebar">

<div class="logo">Flowbittools</div>

<div class="menu">
<button onclick="showSection('member')">👤 Member</button>
<button onclick="showSection('koin')">🪙 Koin</button>
<button onclick="showSection('history')">📜 History</button>
<button onclick="showSection('apikey')">🔑 API Key</button>
<button onclick="showSection('admin2')">🛡 Admin</button>
<button onclick="logout()">🚪 Logout</button>
</div>

</div>

<div class="content">

<div class="card-grid">

<div class="card">
<h2>Total Member</h2>
<p id="totalMember">0</p>
</div>

<div class="card">
<h2>Total Koin</h2>
<p id="totalKoin">0</p>
</div>

<div class="card">
<h2>Total Pendapatan</h2>
<p id="pendapatan">Rp0</p>
</div>

</div>

<div id="member" class="section active-section">

<div class="table-box">

<h2 style="margin-bottom:20px;">Daftar Member</h2>

<table>

<thead>
<tr>
<th>Username</th>
<th>WA</th>
<th>Password</th>
<th>Status</th>
<th>Koin</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="memberTable"></tbody>

</table>

</div>

</div>

<div id="koin" class="section">

<div class="table-box">

<h2>History Koin</h2>

<table>

<thead>
<tr>
<th>User</th>
<th>Koin</th>
<th>Total</th>
</tr>
</thead>

<tbody id="koinTable"></tbody>

</table>

</div>

</div>

<div id="history" class="section">

<div class="table-box">

<h2>History User</h2>

<table>

<thead>
<tr>
<th>User</th>
<th>Aktivitas</th>
<th>Waktu</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>

</table>

</div>

</div>

<div id="apikey" class="section">

<div class="table-box">

<h2>API KEY</h2>

<input id="smm" placeholder="API KEY SMM"/>
<input id="ai" placeholder="API KEY AI"/>

<input id="shopee" placeholder="ID Shopee"/>
<input id="tiktok" placeholder="ID TikTok"/>
<input id="instagram" placeholder="ID Instagram"/>
<input id="facebook" placeholder="ID Facebook"/>

<button class="action-btn purple" style="margin-top:20px;" onclick="saveApi()">Simpan</button>

</div>

</div>

<div id="admin2" class="section">

<div class="table-box">

<h2>Tambah Asisten Admin</h2>

<input id="newAdminUser" placeholder="Username"/>
<input id="newAdminPass" placeholder="Password"/>

<button class="action-btn blue" style="margin-top:20px;" onclick="addAssistant()">Tambah</button>

</div>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
'https://nluwpbdgsctuxuasnkti.supabase.co',
'ISI_ANON_KEY_KAMU'
)

if(localStorage.getItem("adminLogin") !== "true"){
location.href="admin.html"
}

function logout(){
localStorage.removeItem("adminLogin")
location.href="admin.html"
}

function showSection(id){

document.querySelectorAll(".section").forEach(el=>{
el.classList.remove("active-section")
})

document.getElementById(id).classList.add("active-section")
}

async function loadMember(){

const {data,error}=await supabase
.from("users")
.select("*")

if(error) return

document.getElementById("totalMember").innerText=data.length

let totalKoin=0

let html=""

data.forEach(user=>{

totalKoin += Number(user.coin || 0)

html += `
<tr>

<td>${user.username}</td>

<td>
<a href="https://wa.me/${user.wa}" target="_blank" style="color:#60a5fa;">
${user.wa}
</a>
</td>

<td>${user.password}</td>

<td>${user.active}</td>

<td>${user.coin || 0}</td>

<td>

<button class="action-btn green"
onclick="tambahKoin('${user.id}',${user.coin||0})">
+Koin
</button>

<button class="action-btn red"
onclick="kurangKoin('${user.id}',${user.coin||0})">
-Koin
</button>

<button class="action-btn blue"
onclick="toggleStatus('${user.id}','${user.active}')">
Aktif/Nonaktif
</button>

<button class="action-btn red"
onclick="hapusUser('${user.id}')">
Hapus
</button>

</td>

</tr>
`
})

document.getElementById("memberTable").innerHTML=html

document.getElementById("totalKoin").innerText=totalKoin

document.getElementById("pendapatan").innerText=
"Rp"+(totalKoin*3000).toLocaleString()

}

async function tambahKoin(id,koin){

let jumlah=prompt("Tambah koin")

if(!jumlah) return

jumlah=parseInt(jumlah)

await supabase
.from("users")
.update({
coin:koin+jumlah
})
.eq("id",id)

loadMember()
}

async function kurangKoin(id,koin){

let jumlah=prompt("Kurangi koin")

if(!jumlah) return

jumlah=parseInt(jumlah)

await supabase
.from("users")
.update({
coin:koin-jumlah
})
.eq("id",id)

loadMember()
}

async function toggleStatus(id,status){

let baru=status=="aktif"?"pending":"aktif"

await supabase
.from("users")
.update({
active:baru
})
.eq("id",id)

loadMember()
}

async function hapusUser(id){

if(confirm("Hapus user?")){

await supabase
.from("users")
.delete()
.eq("id",id)

loadMember()
}
}

async function saveApi(){

alert("API berhasil disimpan")

}

async function addAssistant(){

const user=document.getElementById("newAdminUser").value
const pass=document.getElementById("newAdminPass").value

await supabase
.from("admins")
.insert([{
username:user,
password:pass,
role:"assistant"
}])

alert("Asisten admin berhasil dibuat")
}

loadMember()

setInterval(loadMember,2000)

</script>

</body>
</html>
