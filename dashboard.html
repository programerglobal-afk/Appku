Dashboard Flowbittools (Versi Bersih)

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowbittools Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

.mobile-header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:#081028;
display:flex;
align-items:center;
padding:0 18px;
z-index:999;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.menu-btn{
background:none;
border:none;
color:white;
font-size:28px;
cursor:pointer;
margin-right:14px;
}

.logo{
font-size:28px;
font-weight:bold;
background:linear-gradient(to right,#7c3aed,#ff0080);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sidebar{
position:fixed;
top:0;
left:-280px;
width:260px;
height:100vh;
background:#081028;
padding:20px;
transition:0.3s;
z-index:1000;
overflow:auto;
}

.sidebar.active{
left:0;
}

.sidebar button{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:12px;
background:#111827;
color:white;
cursor:pointer;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
z-index:900;
}

.overlay.active{
display:block;
}

.main{
padding:90px 18px 30px;
}

.page{
display:none;
}

#dashboard{
display:block;
}

.section{
background:#081028;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.input,
.select,
textarea{
width:100%;
padding:14px;
border:none;
outline:none;
background:#111827;
color:white;
border-radius:12px;
margin-bottom:14px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#7c3aed,#ff0080);
color:white;
font-weight:bold;
cursor:pointer;
}

.kelas-card{
background:#111827;
padding:15px;
border-radius:15px;
margin-top:15px;
}

.kelas-card iframe{
width:100%;
height:220px;
border:none;
border-radius:12px;
margin-top:10px;
background:black;
}

.submenu{
display:none;
padding-left:10px;
}

.sub-btn{
background:#172554 !important;
}
</style>
</head>
<body>

<div class="mobile-header">
<button class="menu-btn" onclick="toggleSidebar()">☰</button>
<div class="logo">Flowbittools</div>
</div>

<div class="sidebar" id="sidebar">

<button onclick="showPage('dashboard')">🏠 Dashboard</button>
<button onclick="showPage('trafik')">🚀 Trafik</button>
<button onclick="showPage('ai')">🤖 AI Tools</button>

<button onclick="toggleKelas()">🎓 Chatbot Kelas</button>

<div class="submenu" id="submenuKelas">
<button class="sub-btn" onclick="cekKey('premium')">⭐ Premium</button>
<button class="sub-btn" onclick="cekKey('private')">🔒 Private</button>
<button class="sub-btn" onclick="cekKey('vip')">👑 VIP</button>
<button class="sub-btn" onclick="cekKey('exclusive')">💎 Exclusive</button>
</div>

<button onclick="showPage('topup')">💰 Topup</button>
<button onclick="logout()">🚪 Logout</button>

</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="main">

<div id="dashboard" class="page">
<div class="section">
<h2>Dashboard User</h2>
<p id="usernameText">User</p>
</div>
</div>

<div id="trafik" class="page">
<div class="section">
<h2>Trafik Service</h2>
<input class="input" placeholder="Masukan link">
<select class="select">
<option>1000 View</option>
<option>5000 View</option>
</select>
<button class="btn">Booster</button>
</div>
</div>

<div id="ai" class="page">
<div class="section">
<h2>AI Tools</h2>
<textarea class="input" placeholder="Masukan prompt"></textarea>
<button class="btn">Generate</button>
</div>
</div>

<div id="premium" class="page">
<div class="section">
<h2>⭐ Kelas Premium</h2>
<div id="listMateri"></div>
</div>
</div>

<div id="private" class="page">
<div class="section">
<h2>🔒 Kelas Private</h2>
<div id="listPrivate"></div>
</div>
</div>

<div id="vip" class="page">
<div class="section">
<h2>👑 Kelas VIP</h2>
<div id="listVip"></div>
</div>
</div>

<div id="exclusive" class="page">
<div class="section">
<h2>💎 Kelas Exclusive</h2>
<div id="listExclusive"></div>
</div>
</div>

<div id="topup" class="page">
<div class="section">
<h2>Topup Koin</h2>
<p>BRI Thomas Ade Prabowo</p>
<p>676201000757500</p>
</div>
</div>

</div>

<script>

const supabaseUrl = "https://nluwpbdgsctuxuasnkti.supabase.co";
const supabaseKey = "sb_publishable_jYSLtUH4UKxt_QQRhGPlgQ_N3HQ5gFu";

const client = window.supabase.createClient(
supabaseUrl,
supabaseKey
);

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

function toggleKelas(){
const submenu = document.getElementById("submenuKelas");
submenu.style.display = submenu.style.display === "block" ? "none" : "block";
}

function showPage(id){
document.querySelectorAll('.page').forEach(page=>{
page.style.display = 'none';
});

document.getElementById(id).style.display = 'block';

document.getElementById("sidebar").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

function logout(){
localStorage.removeItem("loginUser");
window.location.href = "index.html";
}

function cekKey(kelas){
let userKey = prompt("Masukan Key Akses");

let allKeys = JSON.parse(localStorage.getItem("allKeys")) || [];

let cocok = allKeys.find(
k => k.kelas === kelas && k.key === userKey
);

if(cocok){
showPage(kelas);
}else{
alert("Key salah atau tidak aktif");
}
}

const username = localStorage.getItem("username");

if(username){
document.getElementById("usernameText").innerText = username;
}

async function loadMateri(){

const { data, error } = await client
.from("materi")
.select("*");

if(error){
console.log(error);
return;
}

renderMateri(data,"premium","listMateri");
renderMateri(data,"private","listPrivate");
renderMateri(data,"vip","listVip");
renderMateri(data,"exclusive","listExclusive");

}

function renderMateri(data,kelas,target){

const hasil = data.filter(item => item.kelas === kelas);

let html = "";

hasil.forEach((m)=>{

html += `
<div class="kelas-card">
<h3>${m.judul}</h3>

<iframe
src="${m.link.replace('/view?usp=drivesdk','/preview').replace('/view','/preview')}"
allowfullscreen>
</iframe>

</div>
`;

});

document.getElementById(target).innerHTML = html;
}

setTimeout(()=>{
loadMateri();
},1000);

</script>

</body>
</html>
