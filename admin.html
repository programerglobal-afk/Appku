<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowbittools Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

.sidebar{
width:280px;
background:#0d1327;
padding:25px;
position:fixed;
left:0;
top:0;
bottom:0;
overflow:auto;
border-right:1px solid rgba(255,255,255,.05);
transition:.3s;
z-index:999;
}

.logo{
font-size:34px;
font-weight:700;
margin-bottom:40px;
}

.logo span{
color:#7d5fff;
}

.menu button{
width:100%;
border:none;
background:#131d3b;
padding:18px;
border-radius:16px;
color:white;
font-size:15px;
margin-bottom:14px;
cursor:pointer;
transition:.3s;
text-align:left;
}

.menu button:hover{
background:#7d5fff;
}

.main{
margin-left:280px;
padding:30px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.topbar h1{
font-size:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:#0d1327;
padding:25px;
border-radius:24px;
border:1px solid rgba(255,255,255,.05);
box-shadow:0 0 25px rgba(125,95,255,.08);
}

.card h2{
font-size:20px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#151f3f;
color:white;
margin-bottom:14px;
outline:none;
}

table{
width:100%;
border-collapse:collapse;
}

table tr{
border-bottom:1px solid rgba(255,255,255,.05);
}

table td{
padding:12px;
font-size:14px;
}

.btn{
padding:10px 15px;
border:none;
border-radius:10px;
background:#7d5fff;
color:white;
cursor:pointer;
font-weight:600;
}

.btn.red{
background:#ff4d6d;
}

.btn.green{
background:#00c853;
}

.status{
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:600;
display:inline-block;
}

.active{
background:#003d1f;
color:#00ff84;
}

.nonactive{
background:#3d0000;
color:#ff4d6d;
}

.history{
max-height:300px;
overflow:auto;
}

.history-item{
padding:14px;
background:#131d3b;
border-radius:14px;
margin-bottom:10px;
font-size:14px;
}

.mobile{
display:none;
position:fixed;
top:20px;
left:20px;
background:#7d5fff;
border:none;
padding:10px 14px;
border-radius:12px;
color:white;
z-index:1000;
}

@media(max-width:900px){

.mobile{
display:block;
}

.sidebar{
left:-100%;
}

.sidebar.show{
left:0;
}

.main{
margin-left:0;
padding-top:80px;
}

}

</style>
</head>
<body>

<button class="mobile" onclick="toggleMenu()">☰</button>

<div class="sidebar" id="sidebar">

<div class="logo">
Flowbit<span>tools</span>
</div>

<div class="menu">

<button onclick="showSection('member')">👥 Member</button>

<button onclick="showSection('coin')">🪙 Koin</button>

<button onclick="showSection('history')">📊 History User</button>

<button onclick="showSection('apikey')">🔑 API Key</button>

<button onclick="showSection('assistant')">🛡 Asisten Admin</button>

</div>

</div>

<div class="main">

<div class="topbar">
<h1>Admin Dashboard</h1>

<button class="btn red" onclick="logout()">
Logout
</button>
</div>

<div id="member" class="section">

<div class="card">

<h2>Daftar Member</h2>

<table id="memberTable">

<tr>
<td>Username</td>
<td>WA</td>
<td>Password</td>
<td>Status</td>
<td>Koin</td>
<td>Aksi</td>
</tr>

</table>

</div>

</div>

<div id="coin" class="section" style="display:none;">

<div class="grid">

<div class="card">

<h2>Tambah / Kurangi Koin</h2>

<input type="text" id="coinUser" placeholder="Username">

<input type="number" id="coinValue" placeholder="Jumlah Koin">

<select id="coinType">
<option value="add">Tambah Koin</option>
<option value="remove">Kurangi Koin</option>
</select>

<button class="btn" onclick="updateCoin()">
Simpan
</button>

</div>

<div class="card">

<h2>Total Pendapatan</h2>

<h1 id="money">
Rp 0
</h1>

<p>Total dari pembelian koin member</p>

</div>

</div>

</div>

<div id="history" class="section" style="display:none;">

<div class="card">

<h2>History Aktivitas User</h2>

<div class="history" id="historyBox"></div>

</div>

</div>

<div id="apikey" class="section" style="display:none;">

<div class="grid">

<div class="card">

<h2>Traffic Service API</h2>

<input type="text" id="smmKey" placeholder="API KEY SMM">

<input type="text" placeholder="Shopee Service ID">

<input type="text" placeholder="Tiktok Service ID">

<input type="text" placeholder="Instagram Service ID">

<input type="text" placeholder="Facebook Service ID">

<button class="btn">
Simpan
</button>

</div>

<div class="card">

<h2>AI Tools API</h2>

<input type="text" placeholder="API KEY AI">

<button class="btn">
Simpan
</button>

</div>

</div>

</div>

<div id="assistant" class="section" style="display:none;">

<div class="card">

<h2>Tambah Asisten Admin</h2>

<input type="text" id="assistantUser" placeholder="Username">

<input type="password" id="assistantPass" placeholder="Password">

<button class="btn" onclick="addAssistant()">
Tambah
</button>

</div>

</div>

</div>

<script>

const SUPABASE_URL = "https://nluwpbdgsctuxuasnkti.supabase.co";

const SUPABASE_KEY = "sb_publishable_jYSLtUH4UKxt_QQRhGPlgQ_N3HQ5gFu";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("show");
}

function showSection(id){

document.querySelectorAll(".section")
.forEach(el=>el.style.display="none");

document.getElementById(id).style.display="block";

if(window.innerWidth < 900){
document.getElementById("sidebar")
.classList.remove("show");
}

}

async function loadUsers(){

const { data } = await supabaseClient
.from("users")
.select("*");

let table = `
<tr>
<td>Username</td>
<td>WA</td>
<td>Password</td>
<td>Status</td>
<td>Koin</td>
<td>Aksi</td>
</tr>
`;

data.forEach(user=>{

table += `
<tr>

<td>${user.username}</td>

<td>
<a href="https://wa.me/${user.wa}" target="_blank" style="color:#7d5fff;">
${user.wa}
</a>
</td>

<td>${user.password}</td>

<td>

<span class="status ${user.active ? 'active' : 'nonactive'}">
${user.active ? 'Aktif' : 'Nonaktif'}
</span>

</td>

<td>${user.coin || 0}</td>

<td>

<button class="btn green"
onclick="toggleUser(${user.id},true)">
Aktif
</button>

<button class="btn red"
onclick="toggleUser(${user.id},false)">
Nonaktif
</button>

<button class="btn red"
onclick="deleteUser(${user.id})">
Hapus
</button>

</td>

</tr>
`;

});

document.getElementById("memberTable").innerHTML = table;

}

async function toggleUser(id,status){

await supabaseClient
.from("users")
.update({active:status})
.eq("id",id);

loadUsers();

}

async function deleteUser(id){

await supabaseClient
.from("users")
.delete()
.eq("id",id);

loadUsers();

}

async function updateCoin(){

let username =
document.getElementById("coinUser").value;

let value =
parseInt(document.getElementById("coinValue").value);

let type =
document.getElementById("coinType").value;

const { data } = await supabaseClient
.from("users")
.select("*")
.eq("username",username)
.single();

if(!data) return alert("User tidak ada");

let current = data.coin || 0;

let finalCoin =
type == "add"
? current + value
: current - value;

if(finalCoin < 0) finalCoin = 0;

await supabaseClient
.from("users")
.update({coin:finalCoin})
.eq("username",username);

let total =
value * 3000;

document.getElementById("money")
.innerText = "Rp " + total.toLocaleString("id-ID");

alert("Koin berhasil diperbarui");

loadUsers();

}

async function addAssistant(){

let username =
document.getElementById("assistantUser").value;

let password =
document.getElementById("assistantPass").value;

await supabaseClient
.from("admins")
.insert([{

username,
password,
role:"assistant"

}]);

alert("Asisten admin berhasil dibuat");

}

async function loadHistory(){

const { data } = await supabaseClient
.from("history")
.select("*");

let html = "";

data.forEach(item=>{

html += `
<div class="history-item">

<b>${item.username}</b>

<br>

${item.action}

<br><br>

<small>${item.created_at}</small>

</div>
`;

});

document.getElementById("historyBox").innerHTML = html;

}

function logout(){

localStorage.removeItem("admin");

window.location.href="admin-login.html";

}

loadUsers();

loadHistory();

</script>

</body>
</html>
